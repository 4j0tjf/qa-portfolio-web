name: Playwright Automated QA

on:
  workflow_dispatch:
    inputs:
      target_urls:
        description: '검증할 타겟 웹페이지 URL 목록'
        required: true
        type: string
      job_id:
        description: 'Supabase 접수 번호'
        required: true
        type: string
      # 👇 새로 추가됨: API에서 보낸 spec_url을 받을 준비
      spec_url:
        description: '기준이 되는 Spec URL'
        required: true
        type: string

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: 패키지 설치
      run: npm ci
      
    - name: Playwright 브라우저 캐싱
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
        
    - name: Playwright 설치
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
      
    - name: OS 의존성 설치
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps
      
    - name: QA 자동화 스크립트 실행
      env:
        TARGET_URLS: ${{ inputs.target_urls }} 
        SPEC_URL: ${{ inputs.spec_url }} # 👇 추가됨: Playwright 코드(.spec.ts)로 환경변수 전달
      run: npx playwright test

    - name: 에러 증거물(스크린샷 및 리포트) 저장하기
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: playwright-report-${{ inputs.job_id }}
        path: playwright-report/
        retention-days: 7

    - name: Supabase DB에 결과 보고하기
      if: always()
      run: |
        STATUS="failed"
        if [ "${{ job.status }}" == "success" ]; then
          STATUS="success"
        fi

        curl -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/qa_jobs?job_id=eq.${{ inputs.job_id }}" \
        -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
        -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
        -H "Content-Type: application/json" \
        -d "{\"status\": \"$STATUS\", \"run_id\": \"${{ github.run_id }}\"}"