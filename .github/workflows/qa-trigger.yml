name: Playwright Automated QA

on:
  workflow_dispatch:
    inputs:
      target_urls:
        description: '검증할 타겟 웹페이지 URL 목록'
        required: true
        type: string
      job_id:
        description: 'Supabase 접수 번호'
        required: true
        type: string

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: 패키지 설치
      run: npm ci
      
    - name: Playwright 설치
      run: npx playwright install --with-deps
      
    - name: QA 자동화 스크립트 실행
      env:
        TARGET_URLS: ${{ inputs.target_urls }} 
      run: npx playwright test

    # 👇 [새로 추가된 기능] 테스트가 실패하든 성공하든, 결과물(사진, HTML 리포트)을 깃허브에 압축해서 저장합니다!
    - name: 에러 증거물(스크린샷 및 리포트) 저장하기
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: playwright-report-${{ inputs.job_id }}
        path: playwright-report/
        retention-days: 7

    - name: Supabase DB에 결과 보고하기
      if: always()
      run: |
        STATUS="failed"
        if [ "${{ job.status }}" == "success" ]; then
          STATUS="success"
        fi

        curl -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/qa_jobs?job_id=eq.${{ inputs.job_id }}" \
        -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
        -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
        -H "Content-Type: application/json" \
        -d "{\"status\": \"$STATUS\"}"