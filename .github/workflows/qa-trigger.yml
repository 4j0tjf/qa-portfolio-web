name: Playwright Automated QA

on:
  workflow_dispatch:
    inputs:
      target_urls:
        description: '검증할 타겟 웹페이지 URL 목록'
        required: true
        type: string
      job_id:
        description: 'Supabase 접수 번호' # 👈 프론트엔드에서 넘겨준 번호표를 받습니다.
        required: true
        type: string

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: 패키지 설치
      run: npm ci
      
    - name: Playwright 설치
      run: npx playwright install --with-deps
      
    - name: QA 자동화 스크립트 실행
      env:
        TARGET_URLS: ${{ inputs.target_urls }} 
      run: npx playwright test

    # 👇 [새로 추가된 핵심 로직] 테스트가 끝나면 Supabase DB에 결과를 덮어씁니다!
    - name: Supabase DB에 결과 보고하기
      if: always()
      run: |
        STATUS="failed"
        if [ "${{ job.status }}" == "success" ]; then
          STATUS="success"
        fi

        # curl을 이용해 Supabase 창고의 해당 job_id를 찾아서 상태(status)를 업데이트합니다.
        curl -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/qa_jobs?job_id=eq.${{ inputs.job_id }}" \
        -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
        -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
        -H "Content-Type: application/json" \
        -d "{\"status\": \"$STATUS\"}"